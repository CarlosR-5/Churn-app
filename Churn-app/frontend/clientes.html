<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Clientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand">Gestión de Clientes</a>

<div>

<a href="dashboard.html" class="btn btn-light me-2">
Dashboard
</a>

<button onclick="logout()" class="btn btn-danger">
Cerrar sesión
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<input id="buscador" class="form-control mb-3" placeholder="Buscar cliente..." onkeyup="buscarCliente()">

<button class="btn btn-success mb-3" onclick="abrirModal()">
Agregar Cliente
</button>

<table class="table table-striped" id="tablaClientes">

<thead>

<tr>

<th>Nombre</th>
<th>Email</th>
<th>Compras</th>
<th>Acciones</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<!-- MODAL CLIENTE -->

<div class="modal fade" id="modalCliente">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Cliente</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input id="nombre" class="form-control mb-2" placeholder="Nombre">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="compras" type="number" class="form-control mb-2" placeholder="Cantidad de compras">

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Cancelar
</button>

<button onclick="guardarCliente()" class="btn btn-success">
Guardar
</button>

</div>

</div>

</div>

</div>

<script src="js/clientes.js"></script>
<script src="js/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
